<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body{
margin:0;
font-family:Arial;
color:white;
background: radial-gradient(circle at top,#1e3a8a,#020617);
overflow:hidden;
}

/* ===== TOP BAR ===== */

.top{
position:absolute;
top:10px;
left:10px;
right:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* smaller icons */
.top-icons{
display:flex;
gap:8px;
}

.icon-box{
width:40px;
height:40px;
border-radius:10px;
background:rgba(255,255,255,0.1);
display:flex;
align-items:center;
justify-content:center;
font-size:16px;
}

/* smaller connection text */
.connection{
position:absolute;
top:60px;
left:12px;
font-size:14px;
opacity:0.85;
}

/* ===== CENTER CONTENT ===== */

.center{
position:absolute;
top:120px;
width:100%;
text-align:center;
}

.label{
letter-spacing:3px;
font-size:14px;
opacity:0.7;
}

.title{
font-size:32px;
font-weight:bold;
margin-top:10px;
}

.url{
font-size:16px;
opacity:0.8;
}

.status{
margin-top:10px;
color:#ff5b5b;
font-weight:bold;
}

/* ===== PLAYER ===== */

.controls{
margin-top:20px;
display:flex;
justify-content:center;
align-items:center;
gap:25px;
}

.btn{
background:none;
border:none;
color:white;
font-size:26px;
}

.play{
width:70px;
height:70px;
border-radius:16px;
background:linear-gradient(#3b82f6,#1d4ed8);
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
}

/* ===== BOTTOM NAV ===== */

.nav{
position:absolute;
bottom:10px;
left:10px;
right:10px;
height:80px;
border-radius:20px;
background:rgba(255,255,255,0.1);
display:flex;
justify-content:space-around;
align-items:center;
font-size:14px;
}

.nav div{
text-align:center;
}

.page{
display:none;
}

.active{
display:block;
}

</style>
</head>

<body>

<!-- ===== RADIO PAGE ===== -->
<div id="radio" class="active">

<div class="top">
  <div class="top-icons">
    <div class="icon-box">WiFi</div>
    <div class="icon-box">BT</div>
  </div>
  <div class="icon-box">Vol</div>
</div>

<div class="connection" id="conn">Connected...</div>

<div class="center">
  <div class="label">INTERNET STREAM</div>
  <div class="title" id="name">La Voix Divine</div>
  <div class="url">radiolavoixdivine.com</div>
  <div class="status" id="status">● NO NETWORK</div>

  <div class="controls">
    <button class="btn" onclick="prev()">⏮</button>
    <button class="play" onclick="toggle()" id="play">▶</button>
    <button class="btn" onclick="next()">⏭</button>
  </div>
</div>

</div>

<!-- ===== SOUND PAGE ===== -->
<div id="sound" class="page">
<h2 style="padding:20px">Sound</h2>

<div style="padding:20px">
<input type="range" min="0" max="100" value="50" id="vol" oninput="setVol(this.value)">
<span id="volVal">50</span>
</div>

</div>

<!-- ===== BT PAGE ===== -->
<div id="bt" class="page">
<h2 style="padding:20px">Bluetooth</h2>
<div style="padding:20px">No devices</div>
</div>

<!-- ===== NAV ===== -->
<div class="nav">
<div onclick="show('radio')">Radio</div>
<div>Library</div>
<div>Ads</div>
<div onclick="show('sound')">Settings</div>
<div>Add</div>
</div>

<script>

/* ===== PAGE NAV ===== */
function show(p){
document.querySelectorAll('.page,#radio').forEach(e=>e.classList.remove('active'));
document.getElementById(p).classList.add('active');
}

/* ===== PLAY CONTROL ===== */
let playing=false;

async function toggle(){
if(playing){
await fetch('/api/stop-stream',{method:'POST'});
playing=false;
document.getElementById("play").innerText="▶";
}else{
await fetch('/api/play-stream',{method:'POST'});
playing=true;
document.getElementById("play").innerText="❚❚";
}
}

/* ===== NEXT / PREV ===== */
function next(){
fetch('/api/next',{method:'POST'});
}
function prev(){
fetch('/api/prev',{method:'POST'});
}

/* ===== VOLUME ===== */
function setVol(v){
document.getElementById("volVal").innerText=v;
fetch('/api/volume',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({volume:v})
});
}

/* ===== LOAD STATUS ===== */
async function load(){
try{
let s=await fetch('/api/state');
let d=await s.json();

document.getElementById("name").innerText=d.station_name||"La Voix Divine";

if(d.playing){
document.getElementById("status").innerText="● LIVE";
document.getElementById("play").innerText="❚❚";
playing=true;
}else{
document.getElementById("status").innerText="● STOPPED";
document.getElementById("play").innerText="▶";
playing=false;
}

document.getElementById("vol").value=d.volume||50;
document.getElementById("volVal").innerText=d.volume||50;

let w=await fetch('/api/wifi-status');
let wd=await w.json();

document.getElementById("conn").innerText=
wd.connected ? "Connected to "+wd.ssid : "No connection";

}catch(e){
console.log(e);
}
}

load();
setInterval(load,5000);

</script>

</body>
</html>
