<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; font-family:Arial; background:#0b1a3a; color:white; }
.page{display:none;padding:20px;}
.active{display:block;}
.nav{position:fixed;bottom:10px;left:10px;right:10px;display:flex;background:#ffffff22;border-radius:20px;}
.nav div{flex:1;text-align:center;padding:10px;}
.btn{background:#00c6ff;padding:10px;border-radius:10px;margin:10px 0;}
.card{background:#ffffff22;padding:15px;border-radius:15px;margin:10px 0;}
.play{width:120px;height:120px;background:#00c6ff;border-radius:20px;margin:auto;display:flex;align-items:center;justify-content:center;font-size:40px;}
</style>
</head>

<body>

<div id="radio" class="page active">
<center>
<h2>La Voix Divine</h2>
<div id="status">STOPPED</div>
<br>
<div class="play" onclick="play()">▶</div>
</center>
</div>

<div id="settings" class="page">
<h2>WiFi</h2>
<div class="btn" onclick="wifi()">Scan WiFi</div>
<div id="wifi"></div>

<h2>Bluetooth</h2>
<div class="btn" onclick="bt()">Scan Bluetooth</div>
<div id="bt"></div>
</div>

<div id="add" class="page">
<h2>Add</h2>
<div class="card" style="text-align:center;">
<img src="/qr" style="width:220px;background:white;padding:10px;border-radius:15px;">
</div>
</div>

<div class="nav">
<div onclick="show('radio')">Radio</div>
<div onclick="show('settings')">Settings</div>
<div onclick="show('add')">Add</div>
</div>

<script>
let audio = new Audio("http://162.244.81.219:8020/live");

function play(){
  if(audio.paused){
    audio.play();
    document.getElementById("status").innerText="LIVE";
  }else{
    audio.pause();
    document.getElementById("status").innerText="STOPPED";
  }
}

function show(p){
  document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
  document.getElementById(p).classList.add("active");
}

function wifi(){
  fetch("/wifi_scan").then(r=>r.json()).then(d=>{
    let h="";
    d.forEach(n=>h+=`<div class="card">${n.ssid}</div>`);
    document.getElementById("wifi").innerHTML=h;
  });
}

function bt(){
  fetch("/bt_scan").then(r=>r.json()).then(d=>{
    let h="";
    d.forEach(n=>h+=`<div class="card">${n.name}</div>`);
    document.getElementById("bt").innerHTML=h;
  });
}
</script>

</body>
</html>
