<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#07143a;color:white}
.page{display:none;height:100vh}
.active{display:block}

.top{padding:20px;font-size:40px;font-weight:900}

.scan-btn{
  margin:20px;
  padding:16px 26px;
  border-radius:16px;
  border:none;
  font-size:20px;
  font-weight:800;
  background:linear-gradient(#40c7ff,#216cff);
  color:white;
}

.status{
  margin:20px;
  font-size:22px;
  font-weight:800;
}

.list{
  height:60vh;
  overflow-y:auto;
  padding:10px 20px 140px;
}

.card{
  background:rgba(255,255,255,.1);
  border-radius:18px;
  padding:18px;
  margin-bottom:12px;
  font-size:22px;
  border:none;
  color:white;
  width:100%;
  text-align:left;
}

.bottom{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:110px;
  background:rgba(255,255,255,.12);
  display:flex;
}

.nav{
  flex:1;
  border:none;
  background:transparent;
  color:white;
  font-size:18px;
  font-weight:800;
}
</style>
</head>

<body>

<!-- WIFI -->
<div id="wifiPage" class="page active">
  <div class="top">WiFi</div>

  <button class="scan-btn" onclick="scanWifi()">Scan WiFi</button>

  <div class="status" id="wifiStatus">Loading...</div>

  <div class="list" id="wifiList"></div>
</div>

<!-- BLUETOOTH -->
<div id="btPage" class="page">
  <div class="top">Bluetooth</div>

  <button class="scan-btn" onclick="scanBluetooth()">Scan Bluetooth</button>

  <div class="status" id="btStatus">Loading...</div>

  <div class="list" id="btList"></div>
</div>

<!-- NAV -->
<div class="bottom">
  <button class="nav" onclick="showPage('wifiPage')">WiFi</button>
  <button class="nav" onclick="showPage('btPage')">Bluetooth</button>
</div>

<script>

function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  if(id==="wifiPage"){
    loadWifi();
    scanWifi(); // AUTO SCAN
  }

  if(id==="btPage"){
    loadBluetooth();
    scanBluetooth(); // AUTO SCAN
  }
}

async function loadWifi(){
  let r=await fetch("/api/wifi-status");
  let d=await r.json();
  document.getElementById("wifiStatus").innerText=
    d.connected ? "Connected to "+d.ssid : "Not connected";
}

async function scanWifi(){
  document.getElementById("wifiStatus").innerText="Scanning...";
  let list=document.getElementById("wifiList");
  list.innerHTML="";

  let r=await fetch("/api/wifi-scan");
  let d=await r.json();

  d.networks.forEach(n=>{
    let b=document.createElement("button");
    b.className="card";
    b.innerHTML=n.ssid+"<br><small>Signal "+n.signal+" | "+n.security+"</small>";
    b.onclick=()=>connectWifi(n.ssid,n.security);
    list.appendChild(b);
  });

  document.getElementById("wifiStatus").innerText="Select a network";
}

async function connectWifi(ssid,sec){
  let pass="";
  if(sec!==""){
    pass=prompt("Password for "+ssid);
    if(pass===null)return;
  }

  document.getElementById("wifiStatus").innerText="Connecting...";

  await fetch("/api/wifi-connect",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ssid:ssid,password:pass})
  });

  setTimeout(loadWifi,2000);
}

async function loadBluetooth(){
  let r=await fetch("/api/bluetooth-status");
  let d=await r.json();
  document.getElementById("btStatus").innerText=
    d.powered ? "Bluetooth On" : "Bluetooth Off";
}

async function scanBluetooth(){
  document.getElementById("btStatus").innerText="Scanning...";
  let list=document.getElementById("btList");
  list.innerHTML="";

  let r=await fetch("/api/bluetooth-scan");
  let d=await r.json();

  d.devices.forEach(dev=>{
    let b=document.createElement("button");
    b.className="card";
    b.innerHTML=dev.name+"<br><small>"+dev.mac+"</small>";
    b.onclick=()=>connectBluetooth(dev.mac);
    list.appendChild(b);
  });

  document.getElementById("btStatus").innerText="Select a device";
}

async function connectBluetooth(mac){
  document.getElementById("btStatus").innerText="Connecting...";

  await fetch("/api/bluetooth-connect",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({mac:mac})
  });

  setTimeout(loadBluetooth,2000);
}

/* AUTO LOAD */
loadWifi();
scanWifi();

</script>

</body>
</html>
