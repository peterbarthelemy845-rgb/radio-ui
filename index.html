<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body {
  margin:0;
  font-family:Arial;
  color:white;
  background: radial-gradient(circle at top, #1e3a8a, #020617);
  overflow:hidden;
}

.screen {
  width:100vw;
  height:100vh;
  position:relative;
}

/* TOP BAR */
.top-bar {
  position:absolute;
  top:10px;
  left:10px;
  right:10px;
  display:flex;
  justify-content:space-between;
}

.icon-box {
  width:32px;
  height:32px;
  border-radius:10px;
  background:rgba(255,255,255,0.1);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
}

.connection {
  position:absolute;
  top:48px;
  left:12px;
  font-size:12px;
  opacity:0.8;
}

/* CENTER */
.radio-main {
  position:absolute;
  top:95px;
  left:0;
  right:0;
  text-align:center;
}

.station-name {
  font-size:38px;
  font-weight:800;
}

.station-url {
  font-size:16px;
  opacity:0.8;
}

.status {
  margin:10px 0;
  font-weight:700;
}

.controls {
  display:flex;
  justify-content:center;
  gap:25px;
  margin-top:20px;
}

.control-btn {
  font-size:28px;
  background:none;
  border:none;
  color:white;
}

.play-btn {
  width:90px;
  height:90px;
  border-radius:20px;
  border:none;
  background:linear-gradient(#3ea8ff,#216cff);
  font-size:40px;
  color:white;
}

/* 🔥 BIG BOTTOM NAV */
.bottom-nav {
  position:absolute;
  bottom:10px;
  left:10px;
  right:10px;
  height:120px;
  border-radius:26px;
  background:rgba(255,255,255,0.12);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 10px;
}

.nav-item {
  flex:1;
  text-align:center;
  font-size:16px;
  font-weight:700;
  white-space:nowrap;
}

.nav-icon {
  font-size:30px;
  margin-bottom:5px;
}

</style>
</head>

<body>
<div class="screen">

<!-- TOP -->
<div class="top-bar">
  <div style="display:flex; gap:6px;">
    <div class="icon-box">WiFi</div>
    <div class="icon-box">BT</div>
  </div>
  <div class="icon-box">Vol</div>
</div>

<div class="connection">Connected to Public_Access</div>

<!-- CENTER -->
<div class="radio-main">
  <div style="letter-spacing:2px;">INTERNET STREAM</div>
  <div class="station-name">La Voix Divine</div>
  <div class="station-url">radiolavoixdivine.com</div>
  <div class="status">● STOPPED</div>

  <div class="controls">
    <button class="control-btn">⏮</button>
    <button class="play-btn">▶</button>
    <button class="control-btn">⏭</button>
  </div>
</div>

<!-- 🔥 BIG MENU -->
<div class="bottom-nav">

  <div class="nav-item">
    <div class="nav-icon">📻</div>
    Radio
  </div>

  <div class="nav-item">
    <div class="nav-icon">🎵</div>
    Library
  </div>

  <div class="nav-item">
    <div class="nav-icon">📢</div>
    Ads
  </div>

  <div class="nav-item">
    <div class="nav-icon">⚙️</div>
    Settings
  </div>

  <div class="nav-item">
    <div class="nav-icon">➕</div>
    Add
  </div>

</div>

</div>
</body>
</html>
