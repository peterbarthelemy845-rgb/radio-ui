<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: Arial;
  background: radial-gradient(circle at center, #1e3c72, #0b1a3a);
  color:white;
}

.page { display:none; padding:20px; }
.page.active { display:block; }

.title { font-size:40px; margin-bottom:20px; }

.card {
  background: rgba(255,255,255,0.1);
  padding:20px;
  border-radius:20px;
  margin-bottom:20px;
}

.btn {
  background: linear-gradient(45deg,#00c6ff,#0072ff);
  padding:15px;
  border-radius:15px;
  text-align:center;
  margin:10px 0;
}

.nav {
  position:fixed;
  bottom:10px;
  left:10px;
  right:10px;
  display:flex;
  justify-content:space-around;
  background: rgba(255,255,255,0.1);
  padding:15px;
  border-radius:20px;
}

.nav div {
  text-align:center;
  flex:1;
}

.center {
  text-align:center;
}

.play-btn {
  width:120px;
  height:120px;
  border-radius:25px;
  background: linear-gradient(45deg,#00c6ff,#0072ff);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
  margin:auto;
}
</style>
</head>

<body>

<!-- RADIO -->
<div id="radio" class="page active">
  <div class="center">
    <div style="font-size:18px;">INTERNET STREAM</div>
    <h1>La Voix Divine</h1>
    <div id="status">STOPPED</div>

    <br>

    <div onclick="togglePlay()" class="play-btn" id="playBtn">▶</div>
  </div>
</div>

<!-- LIBRARY -->
<div id="library" class="page">
  <div class="title">Library</div>
  <div class="card">No stations found</div>
</div>

<!-- ADS -->
<div id="ads" class="page">
  <div class="title">Ads</div>
  <div class="card">Ad space ready</div>
</div>

<!-- SETTINGS -->
<div id="settings" class="page">
  <div class="title">Settings</div>

  <div class="card">
    <h2>WiFi</h2>
    <div class="btn" onclick="scanWifi()">Scan WiFi</div>
    <div id="wifiList"></div>
  </div>

  <div class="card">
    <h2>Bluetooth</h2>
    <div class="btn" onclick="scanBT()">Scan Bluetooth</div>
    <div id="btList"></div>
  </div>
</div>

<!-- ADD -->
<div id="add" class="page">
  <div class="title">Add</div>

  <div class="card center">
    <div style="margin-bottom:15px;">Scan with your phone</div>

    <img src="/qr"
         style="width:250px;height:250px;background:white;padding:10px;border-radius:15px;">

    <div style="margin-top:15px;">Add Station / Upload Wallpaper</div>
  </div>
</div>

<!-- NAV -->
<div class="nav">
  <div onclick="showPage('radio')">Radio</div>
  <div onclick="showPage('library')">Library</div>
  <div onclick="showPage('ads')">Ads</div>
  <div onclick="showPage('settings')">Settings</div>
  <div onclick="showPage('add')">Add</div>
</div>

<script>
let playing = false;
let audio = new Audio("http://162.244.81.219:8020/live");

function togglePlay() {
  if (!playing) {
    audio.play();
    document.getElementById("status").innerText = "LIVE";
    document.getElementById("playBtn").innerText = "❚❚";
    playing = true;
  } else {
    audio.pause();
    document.getElementById("status").innerText = "STOPPED";
    document.getElementById("playBtn").innerText = "▶";
    playing = false;
  }
}

function showPage(id) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function scanWifi() {
  fetch("/wifi_scan")
    .then(r => r.json())
    .then(data => {
      let html = "";
      data.forEach(n => {
        html += `<div class="card">${n.ssid}</div>`;
      });
      document.getElementById("wifiList").innerHTML = html;
    });
}

function scanBT() {
  fetch("/bt_scan")
    .then(r => r.json())
    .then(data => {
      let html = "";
      data.forEach(d => {
        html += `<div class="card">${d.name}</div>`;
      });
      document.getElementById("btList").innerHTML = html;
    });
}
</script>

</body>
</html>
